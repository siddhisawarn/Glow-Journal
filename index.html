<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Glow Journal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>✨ Glow Journal</h1>
    <p>Your personal beauty and self-care tracker</p>
</header>


<section class="container">

    <div class="card">

        <h2>Daily Mood</h2>

        <button onclick="setMood('😊 Happy')">
            😊 Happy
        </button>

        <button onclick="setMood('😌 Calm')">
            😌 Calm
        </button>

        <button onclick="setMood('😴 Tired')">
            😴 Tired
        </button>

        <p id="moodDisplay"></p>

    </div>



    <div class="card">

        <h2>Skincare Routine</h2>


        <input 
        id="skincareInput"
        placeholder="Example: Vitamin C serum">


        <button onclick="addSkincare()">
            Add Routine
        </button>


        <ul id="skincareList"></ul>

    </div>




    <div class="card">

        <h2>Product Wishlist</h2>


        <input 
        id="productInput"
        placeholder="Product name">


        <button onclick="addProduct()">
            Add Product
        </button>


        <ul id="productList"></ul>

    </div>




    <div class="card">

        <h2>Makeup Journal</h2>


        <textarea 
        id="makeupInput"
        placeholder="Write today's makeup notes">
        </textarea>


        <button onclick="saveMakeup()">
            Save Entry
        </button>


        <p id="makeupDisplay"></p>

    </div>


</section>


<script src="script.js"></script>

</body>

</html>
