<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Journal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>✨ Glow Journal</h1>
    <p>Your personal beauty and self-care tracker</p>
</header>


<section class="card">

<h2>🌸 Daily Mood</h2>

<button onclick="setMood('Happy 😊')">Happy</button>
<button onclick="setMood('Relaxed 🌿')">Relaxed</button>
<button onclick="setMood('Tired 😴')">Tired</button>

<p id="moodDisplay"></p>

</section>



<section class="card">

<h2>🧴 Skincare Routine</h2>

<input id="skinInput" placeholder="Add skincare step">

<button onclick="addSkincare()">Add</button>

<ul id="skinList"></ul>

</section>




<section class="card">

<h2>💄 Product Wishlist</h2>

<input id="productInput" placeholder="Add product">

<button onclick="addProduct()">Add</button>

<ul id="productList"></ul>

</section>




<section class="card">

<h2>📖 Beauty Journal</h2>

<textarea id="journalInput" placeholder="Write today's thoughts..."></textarea>

<button onclick="saveJournal()">Save Entry</button>

<p id="journalDisplay"></p>

</section>



<script src="script.js"></script>

</body>
</html>
